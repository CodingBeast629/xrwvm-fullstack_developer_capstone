name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Python Linter (lenient)
        run: |
          echo "Running flake8 (lenient mode)..."
          flake8 . \
            --exclude=server/djangoapp/migrations,__pycache__,.venv,venv,node_modules \
            --ignore=E501,W292,E302,F401,E712,E722
          echo "Python lint completed (lenient mode)"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 14

      - name: Install JSHint
        run: npm install jshint --global

      - name: Run JavaScript Linter (lenient)
        run: |
          echo "Running JSHint (lenient mode)..."
          if [ -d "./server/database" ]; then
            # Run jshint, but do NOT fail the workflow if it finds issues
            find ./server/database -name "*.js" -exec jshint {} + || true
            echo "JavaScript lint completed (lenient mode)"
          else
            echo "No ./server/database directory found. Skipping JS lint."
          fi
